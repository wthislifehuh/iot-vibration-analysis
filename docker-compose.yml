version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: iot_influxdb
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-SuperSecretPassword123!}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-iot_engineering}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-vibration_data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN:-Th1s-Is-A-S3cr3t-T0k3n-F0r-V1br4t10n-An4lys1s}
    networks:
      - vibration_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:latest
    container_name: iot_questdb
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9009:9009"
      - "127.0.0.1:8812:8812"
    volumes:
      - questdb_data:/var/lib/questdb
    networks:
      - vibration_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: iot_mosquitto
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - vibration_net

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: iot_clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9001:9000"
      - "127.0.0.1:9010:9009"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_log:/var/log/clickhouse-server
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-SuperSecretPassword123!}
    networks:
      - vibration_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: iot_postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secretpswd
      - POSTGRES_DB=iot_metadata
    networks:
      - vibration_net

  mqtt_bridge:
    build:
      context: .
      dockerfile: Dockerfile.iot
    container_name: iot_mqtt_bridge
    command: ["python", "mqtt_bridge.py"]
    depends_on:
      - mosquitto
      - clickhouse
      - influxdb
      - questdb
    environment:
      - MQTT_HOST=mosquitto
      - INFLUX_HOST=influxdb
      - QUEST_HOST=questdb
      - CH_HOST=clickhouse
      - PG_HOST=postgres
      - PG_USER=postgres
      - PG_PASSWORD=secretpswd
      - DO_INGESTION=true
    networks:
      - vibration_net

  mqtt_publisher:
    build:
      context: .
      dockerfile: Dockerfile.iot
    container_name: iot_mqtt_publisher
    command: ["python", "sensor_publisher.py"]
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto
    networks:
      - vibration_net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: iot_api
    depends_on:
      - postgres
      - clickhouse
    environment:
      - PG_USER=postgres
      - PG_PASSWORD=secretpswd
      - PG_HOST=postgres
      - CH_HOST=clickhouse
    networks:
      - vibration_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot_frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - api
    networks:
      - vibration_net

networks:
  vibration_net:
    driver: bridge

volumes:
  influxdb_data:
    external: true
  influxdb_config:
    external: true
  questdb_data:
    external: true
  clickhouse_data:
    external: true
  clickhouse_log:
    external: true
  mosquitto_data:
    external: true
  mosquitto_log:
    external: true
  postgres_data:
    external: true
